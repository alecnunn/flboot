[[package]]
name = "flboot"
# Distributed as prebuilt `fl` binaries via GitHub Releases, not crates.io.
#
# `git_only` makes release-plz derive the previous version from the git tag
# (e.g. v0.1.0) instead of the cargo registry. Without it, release-plz looks
# `flboot` up on crates.io, never finds it (we don't publish), and therefore
# can never establish a baseline to bump from -- so it perpetually proposes
# re-releasing the current version instead of bumping.
#
# `publish = false` skips `cargo publish`; git_only still creates the tag and
# GitHub Release, to which the Release workflow attaches the binaries.
git_only = true
publish = false
git_release_enable = true
git_tag_enable = true
