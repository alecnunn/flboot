[[package]]
name = "flboot"
# Distributed as prebuilt `fl` binaries via GitHub Releases, not crates.io.
# `publish = false` here (in the release-plz config, NOT in Cargo.toml) tells
# release-plz to skip `cargo publish` while still bumping the version, cutting a
# git tag, and creating a GitHub Release (the Release workflow attaches the
# binaries to it). Keeping Cargo.toml publishable is what lets release-plz see
# the package at all.
publish = false
git_release_enable = true
git_tag_enable = true
